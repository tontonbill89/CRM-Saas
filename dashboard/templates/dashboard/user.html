{% extends 'dashboard/base.html' %}

{% block content %}
{% load static %}
<div class="card mt-5 p-4">
    <h5>Liste des utlisateurs</h5>
    <div class="table-responsive">
        <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">

            <!-- Recherche -->
            <input type="text" id="searchInput" class="form-control w-auto"
                placeholder="Rechercher...">

            <!-- Filtres -->
            <select id="filterEquipe" class="form-select w-auto">
                <option value=""></option>
            </select>

            <select id="filterSecteur" class="form-select w-auto">
                <option value=""></option>
            </select>
            {% if not is_superviseur %}
            <select id="filterProfile" class="form-select w-auto">
                <option value=""></option>
            </select>
            {% endif %}
            <small id="tableInfo" class="text-muted"></small>
        </div>

        {% if not is_superviseur %}
        <div>
            <button class="btn btn-success" onclick="openAddModal()">+ Ajouter</button>
        </div>
        {% endif %}

        </br>
        <table class="table table-hover align-right">
            <thead>
                <tr>
                    <th scope="col">Login</th>
                    <th scope="col">Prénoms et Nom</th>
                    <th scope="col">Contact</th>
                    <th scope="col">Adresse email</th>
                    <th scope="col">Profile</th>
                    <th scope="col">Equipe</th>
                    <th scope="col">Secteur</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody id="usersTable" class="table-group-divider"></tbody>
        </table>
    </div>

</div>

<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Utilisateur</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div id="modalBody" class="modal-body">
            </div>
        </div>
    </div>
</div>

<script>
    const IS_ADMIN = {{ is_admin|yesno:'true,false' }};
    const IS_SUPERVISEUR = {{ is_superviseur|yesno:'true,false' }};
</script>
<script src="{% static 'dashboard/js/user.js' %}" defer></script>
{% endblock %}
